# Internal Nginx running INSIDE the `web` container.
# It only serves the React SPA bundle. The public reverse-proxy lives in the
# top-level `nginx` service (see infra/nginx/nginx.conf).
server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived cache for hashed assets, no-cache for index.html itself.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # SPA history fallback — every unknown path returns index.html so the
    # React router can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # gzip text payloads on the way out (the bundle is ~526 KB raw, ~164 KB gz).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hide nginx version in error pages.
    server_tokens off;
}
