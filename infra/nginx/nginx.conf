# Edge nginx reverse-proxy config.
# Mounted into the `nginx` service via docker-compose.
#
#   /api/  -> http://api:3000/api/
#   /*     -> http://web:8080/

server {
  listen 80 default_server;
  server_name _;

  # ── 1) Health check (fast-path, no upstream) ──────────────────────────────
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # ── 2) API reverse-proxy ──────────────────────────────────────────────────
  # Match /api and /api/* both; Hono mounts everything under /api.
  # We DO NOT rewrite the path; api expects to see /api/...
  location /api/ {
    # Generous body size for .stage uploads (100 MB default).
    client_max_body_size 200m;

    proxy_pass         http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
    proxy_set_header   X-Forwarded-Host   $host;
    proxy_set_header   Connection         "";
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Better Auth uses session cookies — make sure they round-trip cleanly.
    proxy_pass_header  Set-Cookie;
    proxy_cookie_path  / "/; HttpOnly; SameSite=Lax";
  }

  # ── 3) Web SPA ────────────────────────────────────────────────────────────
  location / {
    proxy_pass         http://web:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
  }

  # Reasonable defaults.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
