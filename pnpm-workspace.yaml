packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  esbuild: true
  prisma: true

minimumReleaseAgeExclude:
  - '@slidestage/brand@0.1.0'
  - '@slidestage/brand@0.2.0'

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - better-sqlite3
  - esbuild
  - prisma
